<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Media Player</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-base: #0f0f0f;
            --bg-panel: #212121;
            --bg-hover: #3d3d3d;
            --text-main: #f1f1f1;
            --text-muted: #aaaaaa;
            --accent: #ff0000;
            --border-color: #3f3f3f;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --control-height: 56px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
            display: flex;
            user-select: none;
            padding-top: 24px; /* Added padding between player and top of window */
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #717171; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* Typography */
        h1, h2, h3 { font-weight: 600; }
        input, button { font-family: inherit; }

        /* Drag & Drop Overlay */
        #drop-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 4px dashed var(--text-muted);
        }
        #drop-overlay.active { display: flex; }
        #drop-overlay h2 { font-size: 2rem; color: var(--text-main); pointer-events: none; }

        /* Main Layout Grid */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Left Side: Video + Controls + Info */
        #left-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Prevents flexbox overflow */
            overflow-y: auto;
            background: #000;
            border-top-left-radius: 8px;
        }

        /* 1. Video Wrapper (75vh height, absolutely clean) */
        #video-wrapper {
            height: 76vh; /* Approx 75-80% as requested */
            width: 100%;
            background: #000;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
            background: #000;
        }

        /* 2. Controls Bar (Below Video) */
        #controls-bar {
            background: var(--bg-base);
            padding: 0 16px 8px 16px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Seek Bar Container */
        .seek-container {
            width: 100%;
            height: 24px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        .seek-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            transition: height 0.1s;
        }
        .seek-container:hover .seek-track { height: 6px; }
        .seek-filled {
            height: 100%;
            background: var(--accent);
            width: 0%;
            pointer-events: none;
            position: absolute;
            top: 0; left: 0;
        }
        .seek-thumb {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            display: none;
            pointer-events: none;
        }
        .seek-container:hover .seek-thumb { display: block; }

        /* Buttons Row */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 48px;
        }
        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        button {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        button:hover { background: var(--bg-hover); }
        button svg { width: 24px; height: 24px; fill: currentColor; }
        
        .toggle-active svg { fill: var(--accent); }
        
        /* Time Display */
        .time-display {
            font-size: 13px;
            color: var(--text-main);
            margin-left: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Volume Control */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 120px;
        }
        input[type=range].volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type=range].volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* Playback Speed Select */
        select.speed-select {
            background: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        select.speed-select option { background: var(--bg-panel); color: var(--text-main); }

        /* 3. Info Bar */
        #info-bar {
            padding: 16px 24px;
            background: var(--bg-base);
            flex-grow: 1;
        }
        #video-title {
            font-size: 20px;
            line-height: 28px;
            color: var(--text-main);
            word-break: break-all;
            margin-bottom: 8px;
        }
        #video-meta {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Right Side: Playlist */
        #right-pane {
            width: 400px;
            background: var(--bg-base);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-top-right-radius: 8px;
        }

        /* Playlist Header & Controls */
        .playlist-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .playlist-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .playlist-title-row h2 { font-size: 18px; }
        .playlist-count { font-size: 13px; color: var(--text-muted); }

        /* File Upload Button */
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .upload-btn {
            border: none;
            color: var(--text-main);
            background-color: var(--bg-panel);
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            text-align: center;
        }
        .upload-btn:hover { background-color: var(--bg-hover); }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0; top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        /* Search Box */
        .search-box {
            width: 100%;
            padding: 8px 16px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            background: var(--bg-base);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }
        .search-box:focus { border-color: #717171; }

        /* Playlist Items */
        #playlist-items {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 8px 0;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 12px;
        }
        .playlist-item:hover { background: var(--bg-hover); }
        .playlist-item.active { background: rgba(255, 255, 255, 0.1); }
        .playlist-item.active .item-index { display: none; }
        .playlist-item.active .item-playing-icon { display: block; fill: var(--text-main); }
        
        .item-index-container {
            width: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .item-index { font-size: 12px; color: var(--text-muted); }
        .item-playing-icon { display: none; width: 16px; height: 16px; }
        
        .item-details { flex: 1; min-width: 0; }
        .item-title {
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .item-format { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

        .remove-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .playlist-item:hover .remove-btn { opacity: 1; }
        .remove-btn:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.1); }

        /* Empty State */
        .empty-state {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="drop-overlay">
        <h2>Drop video files to add to playlist</h2>
    </div>

    <div id="app-container">
        <div id="left-pane">
            <div id="video-wrapper">
                <video id="player" preload="metadata"></video>
            </div>
            
            <div id="controls-bar">
                <div class="seek-container" id="seek-bar">
                    <div class="seek-track" id="seek-track">
                        <div class="seek-filled" id="seek-filled"></div>
                        <div class="seek-thumb" id="seek-thumb"></div>
                    </div>
                </div>

                <div class="controls-row">
                    <div class="controls-left">
                        <button id="btn-prev" title="Previous (P)">
                            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button id="btn-play" title="Play/Pause (Space)">
                            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button id="btn-next" title="Next (N)">
                            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                        <div class="volume-container">
                            <button id="btn-mute" title="Mute (M)">
                                <svg id="icon-vol-high" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg id="icon-vol-mute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </button>
                            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
                        </div>
                        <div class="time-display">
                            <span id="time-current">0:00</span> / <span id="time-total">0:00</span>
                        </div>
                    </div>

                    <div class="controls-right">
                        <select class="speed-select" id="speed-select" title="Playback Speed">
                            <option value="0.25">0.25x</option>
                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>Normal</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="1.75">1.75x</option>
                            <option value="2">2x</option>
                        </select>

                        <button id="btn-shuffle" title="Shuffle (S)">
                            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                        </button>
                        
                        <button id="btn-loop" title="Loop: OFF (L)">
                            <svg id="icon-loop-all" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                            <svg id="icon-loop-one" viewBox="0 0 24 24" style="display:none;"><path d="M13 21v-3c4.42 0 8-3.58 8-8s-3.58-8-8-8V-1l-4 4 4 4V4c3.31 0 6 2.69 6 6s-2.69 6-6 6v-3l-4 4 4 4zm-2-6V9H9v1h1v5h1z"/></svg>
                        </button>

                        <button id="btn-fullscreen" title="Fullscreen (F)">
                            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="info-bar">
                <h1 id="video-title">No video selected</h1>
                <div id="video-meta">Playlist is empty. Add videos to start watching.</div>
            </div>
        </div>

        <div id="right-pane">
            <div class="playlist-header">
                <div class="playlist-title-row">
                    <h2>Playlist</h2>
                    <span class="playlist-count" id="playlist-count">0 items</span>
                </div>
                <div class="upload-btn-wrapper">
                    <button class="upload-btn">Add Video Files</button>
                    <input type="file" id="file-input" multiple accept="video/*">
                </div>
                <input type="text" class="search-box" id="search-box" placeholder="Filter playlist...">
            </div>
            
            <ul id="playlist-items">
                <div class="empty-state">
                    Drag and drop videos here<br>or click "Add Video Files"
                </div>
            </ul>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            files: new Map(), // id -> { id, file, name, format }
            originalQueue: [], // Array of IDs in upload order
            shuffledQueue: [], // Array of IDs in shuffled order
            activeId: null, // Currently playing ID
            currentUrl: null, // Active ObjectURL (memory optimization)
            isShuffle: false,
            loopMode: 0, // 0 = OFF, 1 = ALL (Playlist), 2 = ONE (Video)
            searchQuery: ''
        };

        let autoIdCounter = 0;

        // --- DOM Elements ---
        const player = document.getElementById('player');
        const fileInput = document.getElementById('file-input');
        const playlistItems = document.getElementById('playlist-items');
        const searchBox = document.getElementById('search-box');
        const dropOverlay = document.getElementById('drop-overlay');
        
        // Controls
        const btnPlay = document.getElementById('btn-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnMute = document.getElementById('btn-mute');
        const iconVolHigh = document.getElementById('icon-vol-high');
        const iconVolMute = document.getElementById('icon-vol-mute');
        const volumeSlider = document.getElementById('volume-slider');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnLoop = document.getElementById('btn-loop');
        const iconLoopAll = document.getElementById('icon-loop-all');
        const iconLoopOne = document.getElementById('icon-loop-one');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const speedSelect = document.getElementById('speed-select');
        const seekBar = document.getElementById('seek-bar');
        const seekFilled = document.getElementById('seek-filled');
        const seekThumb = document.getElementById('seek-thumb');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        
        // Info
        const videoTitle = document.getElementById('video-title');
        const videoMeta = document.getElementById('video-meta');
        const playlistCount = document.getElementById('playlist-count');

        // --- Core Functions ---

        // Get the currently active queue based on shuffle state
        function getActiveQueue() {
            return state.isShuffle ? state.shuffledQueue : state.originalQueue;
        }

        // Generate a new shuffled queue using Fisher-Yates
        function generateShuffleQueue(keepCurrentFirst = true) {
            let queue = [...state.originalQueue];
            for (let i = queue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [queue[i], queue[j]] = [queue[j], queue[i]];
            }
            
            // If playing, ensure current video is at index 0 to avoid jumping
            if (keepCurrentFirst && state.activeId !== null) {
                const currentIndex = queue.indexOf(state.activeId);
                if (currentIndex > 0) {
                    [queue[0], queue[currentIndex]] = [queue[currentIndex], queue[0]];
                }
            }
            state.shuffledQueue = queue;
        }

        // Add files to the state (Light Load: Does NOT generate Object URLs immediately)
        function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => f.type.startsWith('video/'));
            if (newFiles.length === 0) return;

            let firstNewId = null;

            newFiles.forEach(file => {
                const id = `vid_${autoIdCounter++}`;
                if (!firstNewId) firstNewId = id;
                
                const format = file.name.split('.').pop() || 'Unknown';
                const fileObj = {
                    id: id,
                    file: file,
                    name: file.name,
                    format: format
                };
                
                state.files.set(id, fileObj);
                state.originalQueue.push(id);
                if (state.isShuffle) {
                    state.shuffledQueue.push(id);
                }
            });

            updatePlaylistUI();

            // Auto-play if nothing is playing
            if (state.activeId === null && firstNewId !== null) {
                playVideo(firstNewId);
            }
        }

        // Remove a file
        function removeFile(id, event) {
            if(event) event.stopPropagation(); // prevent playing when clicking remove
            
            const fileObj = state.files.get(id);
            if (!fileObj) return;

            // Clean arrays
            state.files.delete(id);
            state.originalQueue = state.originalQueue.filter(v => v !== id);
            state.shuffledQueue = state.shuffledQueue.filter(v => v !== id);

            if (state.activeId === id) {
                const activeQueue = getActiveQueue();
                if (activeQueue.length > 0) {
                    playVideo(activeQueue[0]); // Play next available
                } else {
                    stopPlayback();
                }
            }

            updatePlaylistUI();
        }

        // Play specific video by ID (Light Load: Only generates URL for active video)
        function playVideo(id) {
            const fileObj = state.files.get(id);
            if (!fileObj) return;

            // Revoke old URL to free memory
            if (state.currentUrl) {
                URL.revokeObjectURL(state.currentUrl);
            }

            state.activeId = id;
            state.currentUrl = URL.createObjectURL(fileObj.file);
            
            player.src = state.currentUrl;
            player.playbackRate = parseFloat(speedSelect.value);
            player.play().catch(e => console.warn("Playback prevented:", e));
            
            // Update UI Details
            videoTitle.textContent = fileObj.name;
            videoMeta.textContent = `Format: ${fileObj.format.toUpperCase()} • File Size: ${(fileObj.file.size / (1024*1024)).toFixed(2)} MB`;
            
            updatePlaylistUI();
            updatePlayPauseButton();
        }

        function stopPlayback() {
            state.activeId = null;
            if (state.currentUrl) {
                URL.revokeObjectURL(state.currentUrl);
                state.currentUrl = null;
            }
            player.src = '';
            videoTitle.textContent = 'No video selected';
            videoMeta.textContent = state.files.size > 0 ? 'Select a video from the playlist' : 'Playlist is empty. Add videos to start watching.';
            timeCurrent.textContent = '0:00';
            timeTotal.textContent = '0:00';
            seekFilled.style.width = '0%';
            seekThumb.style.left = '0%';
            updatePlayPauseButton();
            updatePlaylistUI();
        }

        // Navigation Next
        function playNext(manual = false) {
            if (state.files.size === 0) return;
            let queue = getActiveQueue();
            if (queue.length === 0) return;

            // If natural end (not manual) check loop one (video loop)
            if (!manual && state.loopMode === 2) {
                player.currentTime = 0;
                player.play();
                return;
            }

            let currentIndex = queue.indexOf(state.activeId);
            currentIndex++;

            if (currentIndex >= queue.length) {
                if (state.loopMode === 1) { // Loop Playlist
                    if (state.isShuffle) {
                        // Randomize loop start/end by re-shuffling the queue entirely for the next cycle
                        generateShuffleQueue(false);
                        queue = state.shuffledQueue;
                    }
                    currentIndex = 0;
                } else if (state.loopMode === 0) { // Loop OFF
                    if (manual) {
                        if (state.isShuffle) {
                            generateShuffleQueue(false);
                            queue = state.shuffledQueue;
                        }
                        currentIndex = 0; // Manual next wraps to top
                    } else {
                        // Natural end stops
                        return;
                    }
                } else if (state.loopMode === 2 && manual) {
                    currentIndex = 0; // manual next escapes loop one and wraps to top if at end
                }
            }

            playVideo(queue[currentIndex]);
        }

        // Navigation Prev
        function playPrev() {
            if (state.files.size === 0) return;
            // If more than 3 seconds in, just restart current
            if (player.currentTime > 3) {
                player.currentTime = 0;
                return;
            }

            const queue = getActiveQueue();
            if (queue.length === 0) return;

            let currentIndex = queue.indexOf(state.activeId);
            currentIndex--;

            if (currentIndex < 0) {
                currentIndex = queue.length - 1; // Wrap to end
            }

            playVideo(queue[currentIndex]);
        }

        // --- UI Updates ---

        function updatePlaylistUI() {
            const queue = state.originalQueue; // Playlist UI always shows original order, highlights active
            playlistCount.textContent = `${state.files.size} items`;

            if (queue.length === 0) {
                playlistItems.innerHTML = `<div class="empty-state">Drag and drop videos here<br>or click "Add Video Files"</div>`;
                return;
            }

            playlistItems.innerHTML = '';
            
            queue.forEach((id, index) => {
                const fileObj = state.files.get(id);
                // Search filter
                if (state.searchQuery && !fileObj.name.toLowerCase().includes(state.searchQuery.toLowerCase())) {
                    return;
                }

                const isActive = state.activeId === id;
                const li = document.createElement('li');
                li.className = `playlist-item ${isActive ? 'active' : ''}`;
                li.onclick = () => playVideo(id);

                li.innerHTML = `
                    <div class="item-index-container">
                        <span class="item-index">${index + 1}</span>
                        <svg class="item-playing-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <div class="item-details">
                        <div class="item-title" title="${fileObj.name}">${fileObj.name}</div>
                        <div class="item-format">${fileObj.format}</div>
                    </div>
                    <button class="remove-btn" onclick="removeFile('${id}', event)" title="Remove">
                        <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                `;
                playlistItems.appendChild(li);

                // Scroll into view if active
                if (isActive) {
                    setTimeout(() => {
                        li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 50);
                }
            });
        }

        function updatePlayPauseButton() {
            if (player.paused) {
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            } else {
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            }
        }

        function togglePlay() {
            if (!player.src) {
                if (state.files.size > 0) playVideo(getActiveQueue()[0]);
                return;
            }
            if (player.paused) player.play();
            else player.pause();
        }

        function toggleMute() {
            player.muted = !player.muted;
            updateVolumeUI();
        }

        function updateVolumeUI() {
            volumeSlider.value = player.muted ? 0 : player.volume;
            if (player.muted || player.volume === 0) {
                iconVolHigh.style.display = 'none';
                iconVolMute.style.display = 'block';
            } else {
                iconVolHigh.style.display = 'block';
                iconVolMute.style.display = 'none';
            }
        }

        function toggleShuffle() {
            state.isShuffle = !state.isShuffle;
            if (state.isShuffle) {
                btnShuffle.classList.add('toggle-active');
                generateShuffleQueue(true); // Generates and keeps current playing video at index 0
            } else {
                btnShuffle.classList.remove('toggle-active');
            }
        }

        function cycleLoop() {
            state.loopMode = (state.loopMode + 1) % 3;
            btnLoop.classList.remove('toggle-active');
            iconLoopAll.style.display = 'none';
            iconLoopOne.style.display = 'none';

            if (state.loopMode === 0) { // OFF
                btnLoop.title = "Loop: OFF (L)";
                iconLoopAll.style.display = 'block';
            } else if (state.loopMode === 1) { // ALL (Playlist)
                btnLoop.title = "Loop: Playlist (L)";
                btnLoop.classList.add('toggle-active');
                iconLoopAll.style.display = 'block';
            } else if (state.loopMode === 2) { // ONE (Video)
                btnLoop.title = "Loop: Video (L)";
                btnLoop.classList.add('toggle-active');
                iconLoopOne.style.display = 'block';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                player.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Format time in seconds to M:SS or H:MM:SS
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // --- Event Listeners ---

        // File Input
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = ''; // Reset input
        });

        // Search Input
        searchBox.addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            updatePlaylistUI();
        });

        // Drag & Drop
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            const types = e.dataTransfer.types;
            if (types.includes('Files')) {
                dropOverlay.classList.add('active');
            }
        });
        document.addEventListener('dragover', (e) => { e.preventDefault(); });
        document.addEventListener('dragleave', (e) => {
            if (e.target === dropOverlay) {
                dropOverlay.classList.remove('active');
            }
        });
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dropOverlay.classList.remove('active');
            if (e.dataTransfer.files) {
                handleFiles(e.dataTransfer.files);
            }
        });

        // Player Events
        player.addEventListener('play', updatePlayPauseButton);
        player.addEventListener('pause', updatePlayPauseButton);
        player.addEventListener('ended', () => playNext(false));
        
        player.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = formatTime(player.duration);
        });
        
        player.addEventListener('timeupdate', () => {
            timeCurrent.textContent = formatTime(player.currentTime);
            if (player.duration) {
                const percent = (player.currentTime / player.duration) * 100;
                seekFilled.style.width = `${percent}%`;
                seekThumb.style.left = `${percent}%`;
            }
        });

        // Click on video toggles play/pause
        player.addEventListener('click', togglePlay);

        // Buttons
        btnPlay.addEventListener('click', togglePlay);
        btnNext.addEventListener('click', () => playNext(true));
        btnPrev.addEventListener('click', playPrev);
        btnMute.addEventListener('click', toggleMute);
        btnShuffle.addEventListener('click', toggleShuffle);
        btnLoop.addEventListener('click', cycleLoop);
        btnFullscreen.addEventListener('click', toggleFullscreen);

        // Volume Slider
        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            player.volume = val;
            player.muted = val === 0;
            updateVolumeUI();
        });

        // Speed Selector
        speedSelect.addEventListener('change', (e) => {
            player.playbackRate = parseFloat(e.target.value);
        });

        // Seek Bar (Click to seek)
        seekBar.addEventListener('click', (e) => {
            if (!player.duration) return;
            const rect = seekBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            player.currentTime = pos * player.duration;
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Ignore if typing in search box
            if (document.activeElement.tagName === 'INPUT' && document.activeElement.type === 'text') return;

            switch(e.code) {
                case 'Space':
                case 'KeyK':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    player.currentTime = Math.max(0, player.currentTime - 10);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if(player.duration) player.currentTime = Math.min(player.duration, player.currentTime + 10);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    player.volume = Math.min(1, player.volume + 0.1);
                    player.muted = false;
                    updateVolumeUI();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    player.volume = Math.max(0, player.volume - 0.1);
                    if (player.volume === 0) player.muted = true;
                    updateVolumeUI();
                    break;
                case 'KeyN':
                    playNext(true);
                    break;
                case 'KeyP':
                    playPrev();
                    break;
                case 'KeyS':
                    toggleShuffle();
                    break;
                case 'KeyL':
                    cycleLoop();
                    break;
                case 'KeyF':
                    toggleFullscreen();
                    break;
                case 'KeyM':
                    toggleMute();
                    break;
            }
        });

        // Initialize UI State
        updateVolumeUI();
        
    </script>
</body>
</html>
